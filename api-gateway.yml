spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/products/**
            - id: notification-consumer
              uri: lb://NOTIFICATION-CONSUMER
              predicates:
                - Path=/notifications/**
    loadbalancer:
      cache:
        enabled: false

eureka:
  instance:
    prefer-ip-address: true
